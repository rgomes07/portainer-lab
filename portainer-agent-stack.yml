version: "3.9"

services:
  agent:
    image: portainer/agent:latest

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes

    networks:
      - agent_network

    deploy:
      mode: global

      placement:
        constraints:
          - node.platform.os == linux

      restart_policy:
        condition: any

  portainer:
    image: portainer/portainer-ce:latest

    command: -H tcp://tasks.agent:9001 --tlsskipverify

    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: ingress

      - target: 9443
        published: 9443
        protocol: tcp
        mode: ingress

      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress

    volumes:
      - /storage/portainer/portainer_data:/data

    networks:
      - agent_network
      - edge_network

    deploy:
      replicas: 1

      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any

networks:
  agent_network:
    driver: overlay
    attachable: true

  edge_network:
    external: true
